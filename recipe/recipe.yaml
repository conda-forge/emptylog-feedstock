schema_version: 1

context:
  name: emptylog
  version: "0.0.12"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/emptylog-${{ version }}.tar.gz
  sha256: f36f872cd49cd26ef947898f8959a3a030ed46c2a716570cea58d2e8a2fcaca2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools ==68.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - printo >=0.0.22

tests:
  - python:
      imports:
        - emptylog
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Mimicking the logger protocol
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pomponchik/emptylog

extra:
  recipe-maintainers:
    - thewchan
